# templates/kubernetes/rbac.yaml
# ────────────────────────────────
# HSED-aware Kubernetes RBAC for workloads that need to interact with
# cloud KMS via service account credentials.
#
# This template defines ClusterRoles and RoleBindings that map to HSED
# permission levels. Each role gets only the Kubernetes permissions it
# needs to operate within its HSED authorization boundary.
#
# Apply with:
#   kubectl apply -f rbac.yaml -n <namespace>
#
# After applying, annotate service accounts to use Workload Identity
# (GKE), IRSA (EKS), or Managed Identity (AKS) with the cloud KMS
# permissions generated by `hsed generate [aws-kms|gcp-kms|azure] ...`

---
# ── hsed:signer (12 / HS--) ────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hsed-signer
  labels:
    hsed.io/role: signer
    hsed.io/permissions: "12"
    hsed.io/label: "HS--"
  annotations:
    hsed.io/description: "H+S: CI/CD pipelines, code signing"
    hsed.io/generate-cmd: "hsed generate aws-kms --policy prod.hsed --role signer --key-arn <arn>"
rules:
  # Access to signing secrets / configmaps (not actual keys — those live in KMS)
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["hsed-signer-credentials"]
    verbs: ["get"]
  # Can read its own service account token (for KMS auth)
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hsed-signer-binding
  labels:
    hsed.io/role: signer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hsed-signer
subjects:
  - kind: ServiceAccount
    name: hsed-signer
    namespace: ci-system   # change to your namespace

---
# ── hsed:vault (3 / --ED) ──────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hsed-vault
  labels:
    hsed.io/role: vault
    hsed.io/permissions: "3"
    hsed.io/label: "--ED"
  annotations:
    hsed.io/description: "E+D: secrets management, sealed stores"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hsed-vault-binding
  labels:
    hsed.io/role: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hsed-vault
subjects:
  - kind: ServiceAccount
    name: hsed-vault
    namespace: secrets-system

---
# ── hsed:audit (9 / H--D) ──────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hsed-audit
  labels:
    hsed.io/role: audit
    hsed.io/permissions: "9"
    hsed.io/label: "H--D"
  annotations:
    hsed.io/description: "H+D: compliance, forensics, read-only"
rules:
  # Audit role: read-only on secrets and events
  - apiGroups: [""]
    resources: ["secrets", "events", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hsed-audit-binding
  labels:
    hsed.io/role: audit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hsed-audit
subjects:
  - kind: ServiceAccount
    name: hsed-audit
    namespace: compliance-system

---
# ── ServiceAccounts ────────────────────────────────────────────────────────
# For EKS (IRSA): annotate with the IAM role ARN generated by HSED
# For GKE (Workload Identity): annotate with the GCP service account

apiVersion: v1
kind: ServiceAccount
metadata:
  name: hsed-signer
  namespace: ci-system
  labels:
    hsed.io/role: signer
  annotations:
    # EKS / IRSA:
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/hsed-signer
    # GKE / Workload Identity:
    # iam.gke.io/gcp-service-account: hsed-signer@project.iam.gserviceaccount.com

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hsed-vault
  namespace: secrets-system
  labels:
    hsed.io/role: vault
  annotations:
    {}  # add cloud-specific annotations here

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hsed-audit
  namespace: compliance-system
  labels:
    hsed.io/role: audit
  annotations:
    {}

